<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eagle Eye News | Precision Intelligence</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,900;1,9..144,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: '#011433', eagleRed: '#d50a0e', eagleGold: '#fcab04', paper: '#ffffff', ink: '#0a0a0a'
        },
        fontFamily: { sans: ['"Public Sans"', 'sans-serif'], serif: ['Fraunces', 'serif'] }
      }
    }
  }
</script>
<style>
    [x-cloak] { display: none !important; }
    .page { display: none; }
    .page.visible { display: block; animation: view-transition 0.4s ease-out; }
    @keyframes view-transition { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .nav-active { color: #fcab04 !important; border-bottom: 3px solid #d50a0e; }
    .animate-marquee { display: inline-flex; animation: marquee 40s linear infinite; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .dropcap::first-letter { float: left; font-size: 4rem; line-height: 1; font-weight: 900; padding-right: 0.5rem; color: #011433; font-family: 'Fraunces', serif; }
</style>
</head>
<body class="bg-[#f2f4f7] text-ink font-sans">

<!-- TICKER -->
<div class="bg-navy text-white py-1.5 border-b border-eagleGold/30 relative z-[60]">
    <div class="max-w-[1600px] mx-auto px-4 flex items-center overflow-hidden">
        <div class="flex items-center gap-2 shrink-0 bg-eagleRed px-3 py-0.5 rounded text-[10px] font-black uppercase tracking-tighter mr-4">
            <span class="animate-pulse text-white">●</span> LIVE SCAN
        </div>
        <div class="overflow-hidden flex-1">
            <div class="animate-marquee flex gap-12 text-[11px] font-bold uppercase tracking-widest text-eagleGold/80" id="breaking-ticker">
                Establishing Secure Intelligence Link...
            </div>
        </div>
    </div>
</div>

<!-- HEADER -->
<header class="bg-navy text-white sticky top-0 z-50 shadow-2xl">
    <div class="max-w-[1600px] mx-auto px-4">
        <div class="flex items-center justify-between h-20 md:h-24">
            <div class="flex items-center gap-4 cursor-pointer group" onclick="showPage('home'); clearSearch(); updateNavActive(null);">
                <i class="fa-solid fa-eye text-3xl text-eagleGold transition-transform group-hover:scale-110"></i>
                <div class="leading-none">
                    <h1 class="text-2xl md:text-4xl font-black tracking-tighter uppercase" id="site-display-name">Eagle Eye</h1>
                    <span class="text-[9px] tracking-[0.4em] font-light text-eagleGold/60 uppercase">Intelligence Terminal</span>
                </div>
            </div>

            <!-- DYNAMIC NAVIGATION (CATEGORIES) -->
            <nav class="hidden lg:flex items-center gap-8" id="main-nav"></nav>

            <div class="relative hidden md:block">
                <input type="text" id="search-input" placeholder="Query Intel Archive..."
                    class="bg-white/5 border border-white/10 rounded-full px-5 py-2 text-xs w-64 focus:w-80 focus:bg-white focus:text-navy transition-all duration-500 outline-none">
            </div>
        </div>
    </div>
</header>

<main class="max-w-[1600px] mx-auto px-4 py-8 min-h-screen">
    <!-- HOME VIEW -->
    <div class="page visible" id="page-home">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-8">
                <div id="featured-hero" class="relative group cursor-pointer overflow-hidden rounded-2xl bg-navy min-h-[500px]"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="secondary-featured"></div>
            </div>
            <div class="lg:col-span-4 space-y-8 pl-0 lg:pl-8 border-l border-navy/5">
                <div>
                    <h3 class="flex items-center justify-between border-b-4 border-navy pb-3 mb-6">
                        <span class="text-xl font-black uppercase tracking-tighter">Sitrep</span>
                        <span id="sitrep-date" class="text-[10px] font-bold text-eagleRed"></span>
                    </h3>
                    <div id="latest-briefs" class="space-y-6"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- CATEGORY VIEW -->
    <div class="page" id="page-category">
        <h2 class="text-5xl font-black uppercase text-navy mb-12" id="cat-title">Field</h2>
        <div id="category-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </div>

    <!-- ARTICLE VIEW -->
    <div class="page" id="page-article">
        <div class="max-w-4xl mx-auto">
            <button onclick="goBack()" class="mb-12 flex items-center gap-3 text-[10px] font-black uppercase text-slate-400 hover:text-eagleRed transition-all tracking-widest">
                <i class="fa-solid fa-arrow-left"></i> Return to Terminal
            </button>
            <article>
                <span class="bg-navy text-eagleGold px-3 py-1 text-[10px] font-black uppercase" id="full-cat">INTEL</span>
                <h1 class="text-4xl md:text-6xl font-black leading-tight text-navy mt-6 mb-8" id="full-title"></h1>
                <div id="full-media" class="mb-12 rounded-2xl overflow-hidden shadow-2xl"></div>
                <div class="prose max-w-none dropcap" id="full-body"></div>
            </article>
        </div>
    </div>
</main>

<script>
const BASE       = 'https://admin.mendekalemass.ac.ug';
const API_NEWS   = BASE + '/api/news';
const API_CATS   = BASE + '/api/categories';
const API_EVENTS = BASE + '/api/events';

const TARGET_SITE = 'Eagle Eye News';

let articles = [];
let categories = [];
let prevPage = 'home';

async function boot() {
    try {
        const [newsRes, catsRes] = await Promise.all([
            fetch(API_NEWS),
            fetch(API_CATS)
        ]);

        // Fix: Read the JSON once per response object
        const rawNews = await newsRes.json();
        const rawCats = await catsRes.json();

        // 1. FILTER ARTICLES & CATEGORIES
        articles = rawNews.filter(n => n.site && n.site.name === TARGET_SITE).map(item => ({
            id: item.id,
            title: item.title,
            cat: item.category ? item.category.name : 'Intel',
            image: item.image || '',
            lede: item.lede || '',
            body: item.body || item.lede || '',
            date: new Date(item.created_at)
        })).sort((a,b) => b.date - a.date);

        const filteredCats = rawCats.filter(c => c.site && c.site.name === TARGET_SITE);

        // 2. RENDER NAVIGATION
        buildNav(filteredCats);

        // 3. UI SETUP
        document.getElementById('site-display-name').textContent = TARGET_SITE;
        updateTicker();
        renderHome();
        renderSitrep();

    } catch(err) {
        console.error('System Failure:', err);
    }
}

function buildNav(cats) {
    const nav = document.getElementById('main-nav');
    let html = `<a href="#" class="nav-link text-xs font-black uppercase tracking-widest hover:text-eagleGold nav-active" onclick="navTo('home', this, event)">Home</a>`;

    cats.forEach(c => {
        html += `<a href="#" class="nav-link text-xs font-black uppercase tracking-widest hover:text-eagleGold" onclick="navTo('${c.name}', this, event)">${c.name}</a>`;
    });

    nav.innerHTML = html;
}

function updateNavActive(clickedEl) {
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('nav-active'));
    if (clickedEl) clickedEl.classList.add('nav-active');
}

function renderHome() {
    const hero = document.getElementById('featured-hero');
    const news = articles.filter(a => a.cat.toLowerCase() !== 'opinion');
    if (!news.length) return;

    const top = news[0];
    hero.onclick = () => readArticle(top.id);
    hero.innerHTML = `
        <div class="relative h-[600px]">
            <img src="${top.image}" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-all duration-1000">
            <div class="absolute inset-0 bg-gradient-to-t from-navy via-navy/30 to-transparent"></div>
            <div class="absolute bottom-0 left-0 p-12 w-full">
                <span class="inline-block bg-eagleRed text-white text-[10px] font-black uppercase px-3 py-1 mb-6 tracking-widest">Primary Focus</span>
                <h2 class="text-5xl font-black text-white leading-tight group-hover:text-eagleGold transition-colors tracking-tighter">${top.title}</h2>
            </div>
        </div>`;

    document.getElementById('secondary-featured').innerHTML = news.slice(1,3).map(a => `
        <div class="bg-white rounded-2xl overflow-hidden group cursor-pointer border border-navy/5" onclick="readArticle(${a.id})">
            <div class="h-56 overflow-hidden relative"><img src="${a.image}" class="w-full h-full object-cover"></div>
            <div class="p-6">
                <span class="text-[9px] font-black uppercase text-eagleRed">${a.cat}</span>
                <h3 class="text-xl font-black text-navy leading-tight mt-1 group-hover:text-eagleRed transition-colors">${a.title}</h3>
            </div>
        </div>`).join('');
}

function renderSitrep() {
    document.getElementById('sitrep-date').textContent = new Date().toLocaleTimeString();
    const briefs = articles.slice(3, 8);
    document.getElementById('latest-briefs').innerHTML = briefs.map(a => `
        <div class="group cursor-pointer border-b border-navy/5 pb-4 last:border-0" onclick="readArticle(${a.id})">
            <h4 class="text-sm font-black text-navy uppercase group-hover:text-eagleGold transition-colors leading-tight">${a.title}</h4>
            <p class="text-[9px] text-slate-400 font-black uppercase mt-1">${a.cat}</p>
        </div>`).join('');
}

function navTo(name, el, e) {
    if (e) e.preventDefault();
    updateNavActive(el);
    if (name === 'home') { showPage('home'); return; }
    
    document.getElementById('cat-title').textContent = name;
    const filtered = articles.filter(a => a.cat.toLowerCase() === name.toLowerCase());
    document.getElementById('category-list').innerHTML = filtered.map(a => `
        <div class="bg-white rounded-2xl overflow-hidden group cursor-pointer" onclick="readArticle(${a.id})">
            <div class="h-64 overflow-hidden"><img src="${a.image}" class="w-full h-full object-cover group-hover:scale-110 transition-all"></div>
            <div class="p-8"><h3 class="text-2xl font-black text-navy leading-none uppercase group-hover:text-eagleRed">${a.title}</h3></div>
        </div>`).join('');
    showPage('category');
}

function readArticle(id) {
    const a = articles.find(x => x.id === id);
    if (!a) return;
    document.getElementById('full-cat').textContent = a.cat;
    document.getElementById('full-title').textContent = a.title;
    document.getElementById('full-media').innerHTML = `<img src="${a.image}" class="w-full h-auto">`;
    document.getElementById('full-body').innerHTML = a.body.includes('<p>') ? a.body : a.body.split('\n\n').map(p => `<p class="mb-4">${p}</p>`).join('');
    showPage('article');
}

function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
    document.getElementById('page-' + name).classList.add('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateTicker() {
    const text = articles.map(a => `[ ${a.cat.toUpperCase()}: ${a.title.toUpperCase()} ]`).join(' — ');
    document.getElementById('breaking-ticker').textContent = text + " — " + text;
}

function goBack() { showPage(prevPage); }
function clearSearch() { document.getElementById('search-input').value = ''; }

boot();
</script>
</body>
</html>
